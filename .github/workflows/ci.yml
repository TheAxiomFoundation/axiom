name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src tests
        continue-on-error: true  # Pre-existing lint issues, fixing incrementally

      - name: Type check with mypy
        run: |
          mypy src/atlas --ignore-missing-imports
        continue-on-error: true  # Strict typing takes time to fully implement

      - name: Run tests with coverage
        run: |
          pip install pytest-cov pytest-timeout
          pytest tests -v -m "not integration" --cov=atlas --cov-report=term-missing --cov-config=pyproject.toml --timeout=60

  postgres:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: atlas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"

      - name: Test PostgreSQL connection
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/atlas_test
        run: |
          python -c "
          from atlas.storage import PostgresStorage
          storage = PostgresStorage()
          print('PostgreSQL connection successful')
          print('Stats:', storage.get_stats())
          "
